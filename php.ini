; OHMS PHP runtime template
; Copy or merge these settings into the PHP installation that runs OHMS.
; For CLI testing you can also use: php -c C:\Users\User\Desktop\OHMS\php.ini

[PHP]
engine = On
short_open_tag = Off
output_buffering = 4096
max_execution_time = 300
max_input_time = 300
memory_limit = 256M
post_max_size = 64M
upload_max_filesize = 64M
max_file_uploads = 20
default_charset = "UTF-8"
file_uploads = On
allow_url_fopen = On
session.auto_start = 0
date.timezone = UTC

; Adjust this if your PHP installation stores extensions somewhere else.
extension_dir = "ext"

; Required for OHMS core and installer
extension=bcmath
extension=curl
extension=dom
extension=fileinfo
extension=gettext
extension=iconv
extension=mbstring
extension=openssl
extension=pdo_mysql
extension=xml
extension=xmlwriter
extension=zlib

; Usually built into modern PHP builds, listed here for clarity only:
; ctype
; filter
; hash
; json
; libxml
; pcre
; PDO
; tokenizer

; Optional but recommended
; extension=intl
; extension=opcache

display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL
